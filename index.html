<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyNest Navi Mumbai | Library Directory</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <header>
            <h1>StudyNest <span>Navi Mumbai</span></h1>
            <p>Curating 30+ Premier Study Spaces for Academic Excellence</p>
            
            <div class="search-section">
                <input type="text" id="searchInput" placeholder="Search by area (e.g. Kharghar, Vashi, Nerul)...">
                
                <div class="quick-filters">
                    <button class="filter-btn" data-filter="is24h">🌙 24/7 Access</button>
                    <button class="filter-btn" data-filter="hasAC">❄️ AC Rooms</button>
                    <button class="filter-btn" data-filter="isCheap">💰 Under ₹2000</button>
                    <button class="filter-btn" data-filter="isStation">🚉 Near Station</button>
                </div>
            </div>
        </header>

        <main id="libraryGrid" class="grid"></main>
    </div>

    <script src="script.js"></script>
</body>
</html>
